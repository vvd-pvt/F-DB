.segment{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:10px 0}.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:14px;margin:10px 0;box-shadow:0 12px 32px rgba(0,0,0,.12)}
.sectionTitle{font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.08em;margin:0 0 9px;text-transform:uppercase}
input,textarea{width:100%;border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:16px;min-height:48px;padding:12px 14px;font-size:16px;outline:none}
input::placeholder,textarea::placeholder{color:var(--muted)}.rowButtons,.chips,.brandShops{display:flex;gap:8px;overflow-x:auto;padding:8px 0 0;scrollbar-width:none}.rowButtons::-webkit-scrollbar,.chips::-webkit-scrollbar,.brandShops::-webkit-scrollbar{display:none}

function userFor(n){return state[n]||{favorite:3,hidden:false,memo:""}}
function updateUser(n,p){state[n]={...userFor(n),...p};saveState()}
function applyTheme(){const t=localStorage.getItem(THEME_KEY)||"dark";document.body.classList.toggle("light",t==="light");document.getElementById("themeToggle").textContent=t==="light"?"Dark":"Light"}
document.getElementById("themeToggle").onclick=()=>{const n=document.body.classList.contains("light")?"dark":"light";localStorage.setItem(THEME_KEY,n);applyTheme()}
function setMainTab(n){["Search","Compare","Brands"].forEach(t=>{document.getElementById("tab"+t).classList.toggle("active",t===n);document.getElementById("view"+t).style.display=t===n?"":"none"})}
["Search","Compare","Brands"].forEach(t=>document.getElementById("tab"+t).onclick=()=>setMainTab(t))
function productUrl(shop,query){const q=encodeURIComponent(query.trim().toLowerCase());if(!q)return "#";return {END:`https://www.endclothing.com/jp/catalogsearch/results?q=${q}`,SSENSE:`https://www.ssense.com/ja-jp/men?q=${q}`,FARFETCH:`https://www.farfetch.com/jp/shopping/men/search/items.aspx?q=${q}`,YOOX:`https://www.yoox.com/jp/メンズ/shoponline?textsearch=${q}`,HBX:`https://hbx.com/jp/search?q=${q}`}[shop]||"#"}
function renderProductLinks(){const q=document.getElementById("productSearch").value,w=document.getElementById("productLinks");w.innerHTML="";SHOP_ORDER.forEach(s=>{const a=document.createElement("a");a.className="searchLink";a.textContent=s;a.href=productUrl(s,q);a.target="_blank";w.appendChild(a)})}
document.getElementById("productSearch").addEventListener("input",renderProductLinks);document.getElementById("productSearch").addEventListener("keydown",e=>{if(e.key==="Enter"){const a=document.querySelector("#productLinks a");if(a&&a.href!=="#")window.open(a.href,"_blank")}})
function yen(n){return(!isFinite(n)||n<=0)?"¥0":"¥"+Math.round(n).toLocaleString("ja-JP")}function num(v){return Number(String(v||"").replace(/[¥,\s]/g,""))||0}
function buildPriceGrid(){const g=document.getElementById("priceGrid");g.innerHTML="";SHOP_ORDER.forEach(s=>{const r=document.createElement("div");r.className="priceRow";r.dataset.shop=s;r.innerHTML=`<div class="shopName">${s}</div><div class="priceFields"><input class="price" inputmode="numeric" placeholder="Price"><input class="ship" inputmode="numeric" placeholder="Shipping"><input class="tax" inputmode="numeric" placeholder="Duty / Tax"><input class="coupon" inputmode="numeric" placeholder="Coupon"></div><div class="totalsBox"><div class="total">¥0</div><div class="diff"></div></div>`;g.appendChild(r)});document.querySelectorAll(".priceRow input").forEach(i=>i.addEventListener("input",calcPrices))}
function calcPrices(){let best=Infinity,shop="";const rows=[...document.querySelectorAll(".priceRow")];rows.forEach(r=>{const t=num(r.querySelector(".price").value)+num(r.querySelector(".ship").value)+num(r.querySelector(".tax").value)-num(r.querySelector(".coupon").value);r.dataset.total=t;r.querySelector(".total").textContent=yen(t);r.classList.remove("best");if(t>0&&t<best){best=t;shop=r.dataset.shop}});rows.forEach(r=>{const t=Number(r.dataset.total),d=r.querySelector(".diff");if(t>0&&t===best){r.classList.add("best");d.textContent="Best"}else if(t>0&&best<Infinity){d.textContent="+"+yen(t-best)}else d.textContent=""});const s=document.getElementById("bestSummary");if(shop){s.textContent=`BEST PRICE: ${shop} · ${yen(best)}`;s.classList.add("show")}else{s.textContent="";s.classList.remove("show")}}
document.getElementById("calcPrices").onclick=calcPrices;document.getElementById("clearPrices").onclick=()=>{document.getElementById("compareMemo").value="";document.querySelectorAll(".priceRow input").forEach(i=>i.value="");calcPrices()}
function countryLabel(c){return DB.countryLabels&&DB.countryLabels[c]?DB.countryLabels[c]:c}function categoryList(){return["Modern","Street","Accessories"].filter(c=>DB.brands.some(b=>b.categories.includes(c)))}function countryList(){return(DB.countryOrder||[]).filter(c=>DB.brands.some(b=>b.countryGroup===c))}
function makeChip(p,l,v,k){const b=document.createElement("button");b.className="chip"+(filters[k]===v?" active":"");b.textContent=l;b.onclick=()=>{filters[k]=v;renderBrands()};p.appendChild(b)}
function renderFilterChips(){document.querySelectorAll("[data-tier]").forEach(b=>b.classList.toggle("active",b.dataset.tier===filters.tier));const c=document.getElementById("categoryChips");c.innerHTML="";makeChip(c,"All Categories","All","category");categoryList().forEach(v=>makeChip(c,v,v,"category"));const co=document.getElementById("countryChips");co.innerHTML="";makeChip(co,"All Countries","All","country");countryList().forEach(v=>makeChip(co,countryLabel(v),v,"country"));document.getElementById("showHidden").classList.toggle("active",filters.showHidden)}
document.querySelectorAll("[data-tier]").forEach(b=>b.onclick=()=>{filters.tier=b.dataset.tier;renderBrands()});document.getElementById("showHidden").onclick=()=>{filters.showHidden=!filters.showHidden;renderBrands()}
function displayTier(t){return t==="コア"?"Core":"Candidate"}function starHtml(n){let o="";for(let i=1;i<=5;i++)o+=`<span class="star ${i<=n?"on":""}" data-star="${i}">★</span>`;return o}
function filteredBrands(){return DB.brands.filter(b=>{const u=userFor(b.name);if(!filters.showHidden&&u.hidden)return false;if(filters.tier!=="All"&&displayTier(b.tier)!==filters.tier)return false;if(filters.category!=="All"&&!b.categories.includes(filters.category))return false;if(filters.country!=="All"&&b.countryGroup!==filters.country)return false;return true}).sort((a,b)=>{const fa=userFor(a.name).favorite||3,fb=userFor(b.name).favorite||3,o=DB.countryOrder||[],ca=o.indexOf(a.countryGroup),cb=o.indexOf(b.countryGroup);return fb-fa||(ca===-1?999:ca)-(cb===-1?999:cb)||a.name.localeCompare(b.name)})}
function brandSearchLinks(brand,val){const q=(brand+" "+(val||"")).trim();return SHOP_ORDER.map(s=>`<a class="searchLink" target="_blank" href="${productUrl(s,q)}">${s}</a>`).join("")}
function renderBrands(){renderFilterChips();const list=document.getElementById("brandList");list.innerHTML="";const brands=filteredBrands();document.getElementById("brandCount").textContent=`${brands.length} brands`;brands.forEach((b,idx)=>{const u=userFor(b.name),card=document.createElement("article");card.className="brandCard"+(displayTier(b.tier)==="Candidate"?" candidate":"")+(u.hidden?" hiddenCard":"");const shopLinks=(b.shopPriority||SHOP_ORDER).map(s=>{const d=b.shops[s]||{url:"#"};return`<a class="shopLink" href="${d.url}" target="_blank">${s}</a>`}).join(""),sid="brandSearch_"+idx,lid="brandLinks_"+idx;card.innerHTML=`<div class="brandTop"><div><div class="brandName">${b.name}<span class="badge">${displayTier(b.tier)}</span></div><div class="meta">${b.countryLabel||b.country} / ${b.categories.join(", ")}</div></div><div class="stars">${starHtml(u.favorite||3)}</div></div><div class="brandShops">${shopLinks}</div><div class="brandSearch"><input id="${sid}" placeholder="Search within ${b.name}: item name"><div class="rowButtons" id="${lid}">${brandSearchLinks(b.name,"")}</div></div><div class="controls"><button class="tierToggle">${displayTier(b.tier)==="Core"?"To Candidate":"To Core"}</button><button class="hideToggle">${u.hidden?"Show":"Hide"}</button><button class="memoToggle">Memo</button></div><div class="memo"><textarea placeholder="Memo: size, sale timing, notes">${u.memo||b.memo||""}</textarea></div>`;card.querySelectorAll(".star").forEach(st=>st.onclick=()=>{updateUser(b.name,{favorite:Number(st.dataset.star)});renderBrands()});card.querySelector("#"+sid).addEventListener("input",e=>{card.querySelector("#"+lid).innerHTML=brandSearchLinks(b.name,e.target.value)});card.querySelector("#"+sid).addEventListener("keydown",e=>{if(e.key==="Enter"){const a=card.querySelector("#"+lid+" a");if(a)window.open(a.href,"_blank")}});card.querySelector(".tierToggle").onclick=()=>{b.tier=displayTier(b.tier)==="Core"?"候補":"コア";renderBrands()};card.querySelector(".hideToggle").onclick=()=>{updateUser(b.name,{hidden:!u.hidden});renderBrands()};const memo=card.querySelector(".memo");card.querySelector(".memoToggle").onclick=()=>memo.classList.toggle("open");card.querySelector("textarea").oninput=e=>updateUser(b.name,{memo:e.target.value});list.appendChild(card)})}
applyTheme();renderProductLinks();buildPriceGrid();renderBrands();
</script></body></html>
