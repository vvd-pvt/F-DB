let state = JSON.parse(localStorage.getItem("brandDbState") || "{}");
let filters = {cat:"all", country:"all", showHidden:false, tier:"コア"};
function getUser(name){return state[name]||{favorite:3,hidden:false,memo:""}}
function saveUser(name,data){state[name]={...getUser(name),...data};localStorage.setItem("brandDbState",JSON.stringify(state));}
function chip(label,val,type){const b=document.createElement("button");b.className="chip"+(filters[type]===val?" active":"");b.textContent=label;b.onclick=()=>{filters[type]=val;render();};return b;}
function renderFilters(){
 [["tabCore","コア"],["tabCandidate","候補"],["tabAll","all"]].forEach(([id,t])=>document.getElementById(id).className=filters.tier===t?"primary":"");
 const cf=document.getElementById("catFilters");cf.innerHTML="";["all","Street","Clean","Accessories"].forEach(c=>cf.appendChild(chip(c==="all"?"全カテゴリ":c,c,"cat")));
 const yf=document.getElementById("countryFilters");yf.innerHTML="";["all","イギリス","ドイツ","フランス","アメリカ","日本","韓国","その他ヨーロッパ"].forEach(c=>yf.appendChild(chip(c==="all"?"全ての国":c,c,"country")));
 document.getElementById("showHidden").className=filters.showHidden?"primary":"";
}
function starHtml(n){let s="";for(let i=1;i<=5;i++)s+=`<span class="star ${i<=n?"on":""}" data-star="${i}">★</span>`;return s;}
function render(){
 renderFilters();const q=document.getElementById("q").value.toLowerCase().trim();const list=document.getElementById("list");list.innerHTML="";
 let arr=DB.brands.filter(b=>{const u=getUser(b.name);if(!filters.showHidden&&u.hidden)return false;if(filters.tier!=="all"&&b.tier!==filters.tier)return false;if(q&&!b.name.toLowerCase().includes(q))return false;if(filters.cat!=="all"&&!b.categories.includes(filters.cat))return false;if(filters.country!=="all"&&b.countryGroup!==filters.country)return false;return true;});
 arr.sort((a,b)=>(getUser(b.name).favorite||3)-(getUser(a.name).favorite||3)||a.name.localeCompare(b.name));
 document.getElementById("count").textContent=`${arr.length} brands`;
 arr.forEach(b=>{const u=getUser(b.name);const card=document.createElement("div");card.className="card"+(b.tier==="候補"?" candidate":"");
 const shopBtns=b.shopPriority.map(s=>`<a class="shopbtn ${b.shops[s].type}" href="${b.shops[s].url}">${s}</a>`).join("");
 card.innerHTML=`<div class="top"><div><div class="name">${b.name}<span class="badge">${b.tier}</span></div><div class="meta">${b.country} / ${b.categories.join(", ")}</div></div><div class="stars">${starHtml(u.favorite||3)}</div></div><div class="shoprow"><span class="small">順</span><div><div class="small">${b.shopPriority.join(" → ")}</div><div class="shopBtns">${shopBtns}</div></div></div><div class="controls"><button class="tierBtn">${b.tier==="コア"?"候補へ":"コアへ"}</button><button class="hideBtn">${u.hidden?"表示に戻す":"非表示"}</button><button class="memoBtn">メモ</button></div><div class="memo"><textarea placeholder="サイズ感・セール時期などメモ">${u.memo||""}</textarea></div>`;
 card.querySelectorAll(".star").forEach(st=>st.onclick=()=>{saveUser(b.name,{favorite:Number(st.dataset.star)});render();});
 card.querySelector(".hideBtn").onclick=()=>{saveUser(b.name,{hidden:!u.hidden});render();};
 card.querySelector(".tierBtn").onclick=()=>{b.tier=b.tier==="コア"?"候補":"コア";render();};
 const memo=card.querySelector(".memo");card.querySelector(".memoBtn").onclick=()=>memo.classList.toggle("open");card.querySelector("textarea").oninput=e=>saveUser(b.name,{memo:e.target.value});
 list.appendChild(card);});
}
document.getElementById("q").oninput=render;document.getElementById("tabCore").onclick=()=>{filters.tier="コア";render();};document.getElementById("tabCandidate").onclick=()=>{filters.tier="候補";render();};document.getElementById("tabAll").onclick=()=>{filters.tier="all";render();};
document.getElementById("showHidden").onclick=()=>{filters.showHidden=!filters.showHidden;render();};
document.getElementById("exportBtn").onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="my-brand-settings.json";a.click();};
render();
</script></body></html>
